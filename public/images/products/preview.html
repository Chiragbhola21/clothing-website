<!DOCTYPE html>
<html>
<head>
    <title>Image List</title>
    <style>
        body { font-family: sans-serif; background: #f0f0f0; margin: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .item { background: white; padding: 10px; border-radius: 8px; text-align: center; }
        img { max-width: 100%; height: auto; border-radius: 4px; border: 1px solid #ddd; }
        .index { margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Product Images</h1>
    <div class="grid">
        <div class="item"><img src="prod1.jpeg"><div class="index">prod1.jpeg</div></div>
        <div class="item"><img src="prod2.jpeg"><div class="index">prod2.jpeg</div></div>
        <div class="item"><img src="prod3.jpeg"><div class="index">prod3.jpeg</div></div>
        <div class="item"><img src="prod4.jpeg"><div class="index">prod4.jpeg</div></div>
        <div class="item"><img src="prod5.jpeg"><div class="index">prod5.jpeg</div></div>
        <div class="item"><img src="prod6.jpeg"><div class="index">prod6.jpeg</div></div>
        <div class="item"><img src="prod7.jpeg"><div class="index">prod7.jpeg</div></div>
        <div class="item"><img src="prod8.jpeg"><div class="index">prod8.jpeg</div></div>
        <div class="item"><img src="prod9.jpeg"><div class="index">prod9.jpeg</div></div>
        <div class="item"><img src="prod10.jpeg"><div class="index">prod10.jpeg</div></div>
        <div class="item"><img src="prod11.jpeg"><div class="index">prod11.jpeg</div></div>
        <div class="item"><img src="prod12.jpeg"><div class="index">prod12.jpeg</div></div>
        <div class="item"><img src="prod13.jpeg"><div class="index">prod13.jpeg</div></div>
        <div class="item"><img src="prod14.jpeg"><div class="index">prod14.jpeg</div></div>
        <div class="item"><img src="prod15.jpeg"><div class="index">prod15.jpeg</div></div>
        <div class="item"><img src="prod16.jpeg"><div class="index">prod16.jpeg</div></div>
        <div class="item"><img src="prod17.jpeg"><div class="index">prod17.jpeg</div></div>
        <div class="item"><img src="prod18.jpeg"><div class="index">prod18.jpeg</div></div>
    </div>
</body>
</html>
